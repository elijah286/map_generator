<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Generator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">

      <header class="topbar">
        <span class="topbar-title">Map Generator</span>
        <span class="topbar-author">by Elijah Kerry</span>
      </header>

      <main class="main">

        <!-- STEP 1: Upload & configure -->
        <section class="panel" id="panelUpload">
          <h2 class="step-num">1</h2>
          <h3 class="step-title">Upload spreadsheet</h3>

          <div class="field">
            <label class="drop-zone" id="dropZone">
              <input type="file" id="file" accept=".xlsx,.xls" hidden />
              <span class="drop-icon">&#8593;</span>
              <span class="drop-text" id="dropText">Click or drag an .xlsx file here</span>
            </label>
          </div>

          <div class="row-2col" id="sheetRow" hidden>
            <div class="field">
              <label class="field-label">Worksheet</label>
              <select id="sheet" disabled></select>
            </div>
            <div class="field">
              <label class="field-label">Data source</label>
              <select id="mode">
                <option value="user_events">User events (City / State / Country)</option>
                <option value="universities">Universities (columns 1–2)</option>
              </select>
            </div>
          </div>

          <label class="toggle" id="onMapRow" hidden>
            <input type="checkbox" id="onlyOnMap" checked />
            <span>Only rows where "On Map?" is yes</span>
          </label>

          <button class="btn btn-secondary" id="previewBtn" hidden>Load locations</button>
        </section>

        <!-- STEP 2: Confirm locations -->
        <section class="panel" id="panelLocations" hidden>
          <h2 class="step-num">2</h2>
          <h3 class="step-title">Confirm locations</h3>

          <p class="meta" id="locMeta"></p>

          <div class="table-wrap">
            <table id="locTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Location</th>
                  <th>Members</th>
                </tr>
              </thead>
              <tbody id="locBody"></tbody>
            </table>
          </div>
        </section>

        <!-- STEP 3: Configure & generate -->
        <section class="panel" id="panelGenerate" hidden>
          <h2 class="step-num">3</h2>
          <h3 class="step-title">Generate maps</h3>

          <div class="field">
            <label class="field-label">Regions</label>
            <div class="chip-row">
              <label class="chip"><input type="checkbox" class="region" value="world" checked /><span>World</span></label>
              <label class="chip"><input type="checkbox" class="region" value="europe" checked /><span>Europe</span></label>
              <label class="chip"><input type="checkbox" class="region" value="asia" checked /><span>Asia</span></label>
              <label class="chip"><input type="checkbox" class="region" value="north_america" checked /><span>N. America</span></label>
              <label class="chip"><input type="checkbox" class="region" value="south_america" checked /><span>S. America</span></label>
            </div>
          </div>

          <label class="toggle">
            <input type="checkbox" id="useMemberSize" />
            <span>Scale points by member count</span>
          </label>

          <button class="btn btn-primary" id="goBtn">Generate</button>
          <p class="hint error" id="errorHint" hidden></p>
        </section>

        <!-- STEP 4: Results -->
        <section class="panel" id="panelResults" hidden>
          <h2 class="step-num">4</h2>
          <h3 class="step-title">Your maps</h3>
          <p class="meta" id="resultsMeta"></p>

          <div id="mapsContainer"></div>

          <details class="log-details" id="logDetails">
            <summary>Geocoding log</summary>
            <pre id="log"></pre>
          </details>
        </section>

      </main>

      <footer class="foot">
        Built by <strong>Elijah Kerry</strong> &middot; Internal tool
      </footer>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
